version: "3.9"

services:

  postgres:

    image: postgres:16

    restart: always

    environment:

      POSTGRES_DB: ecommerce

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: popo1122

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  app:

    build: .

    restart: always

    env_file:
      - .env

    ports:
      - "3000:3000"

    depends_on:
      - postgres

volumes:
  postgres_data:
